name: Daily Market Watcher

on:
  schedule:
    - cron: '0 0 * * *' # 매일 UTC 00:00 (한국 시간 오전 9시) 실행
  workflow_dispatch: # 수동으로 실행하고 싶을 때 버튼 생성

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install feedparser anthropic requests

    - name: Run script
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: python market_watcher.py

    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add .
        git commit -m "Auto-update Market Archive [skip ci]" || echo "No changes to commit"
        git push
