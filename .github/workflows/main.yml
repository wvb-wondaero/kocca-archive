name: Market Watcher Bot

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 01:00 UTC = 09:00 SGT
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser anthropic requests

      - name: Run market_watcher
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python market_watcher.py

      - name: Commit and push (MD + processed_links)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add MARKET_ARCHIVE.md processed_links.txt
          git commit -m "Auto-update Archive" || echo "No changes to commit"
          git push

      - name: Generate site
        run: python generate.py --input MARKET_ARCHIVE.md --output output

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
